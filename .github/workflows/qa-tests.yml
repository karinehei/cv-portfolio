# QA pipeline — lint, build, Newman API tests, and Robot UI tests on every push/PR (~7–8 min).
# Robot uses system Chrome in CI (no Playwright Chromium download).

name: QA Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: qa-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-api:
    name: Lint · Build · API · Robot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_PAGES: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Run Newman API tests
        run: |
          npm run start > /tmp/app-server.log 2>&1 &
          npx --yes wait-on http-get://127.0.0.1:3000 --timeout 120000
          api_status=$(curl -s -o /tmp/api-preflight.json -w "%{http_code}" -X POST http://127.0.0.1:3000/api/contact \
            -H "Content-Type: application/json" \
            -d '{"name":"CI","email":"ci@example.com","message":"API readiness check message."}')
          if [ "$api_status" != "200" ]; then
            echo "Contact API preflight failed (HTTP ${api_status})."
            cat /tmp/api-preflight.json || true
            cat /tmp/app-server.log || true
            exit 1
          fi
          npx --yes newman run tests/postman/contact-api.postman_collection.json \
            --env-var "baseUrl=http://127.0.0.1:3000"

      - name: Setup Chrome for Robot tests
        uses: browser-actions/setup-chrome@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/robot/requirements.txt

      - name: Install Robot Framework (no Chromium download)
        run: |
          pip install -r tests/robot/requirements.txt
          rfbrowser init --skip-browsers
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Run Robot UI tests
        run: |
          robot --variable CHROME_CHANNEL:chrome --outputdir tests/robot/results tests/robot
