# QA pipeline — fast checks on every push and PR (~5 min).
# UI automation (Robot Framework) runs separately: see robot-tests.yml (manual trigger).

name: QA Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: qa-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-and-api:
    name: Lint · Build · API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_PAGES: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Production build
        run: npm run build

      - name: Run Newman API tests
        run: |
          npm run start > /tmp/app-server.log 2>&1 &
          npx --yes wait-on http-get://127.0.0.1:3000 --timeout 120000
          api_status=$(curl -s -o /tmp/api-preflight.json -w "%{http_code}" -X POST http://127.0.0.1:3000/api/contact \
            -H "Content-Type: application/json" \
            -d '{"name":"CI","email":"ci@example.com","message":"API readiness check message."}')
          if [ "$api_status" != "200" ]; then
            echo "Contact API preflight failed (HTTP ${api_status})."
            cat /tmp/api-preflight.json || true
            cat /tmp/app-server.log || true
            exit 1
          fi
          npx --yes newman run tests/postman/contact-api.postman_collection.json \
            --env-var "baseUrl=http://127.0.0.1:3000"
