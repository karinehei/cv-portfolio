# QA pipeline for the CV portfolio project.
# Demonstrates continuous testing: static checks, build, API (Newman), UI (Robot Framework).
#
# Configuration notes:
# - Requires Node.js 20 and Python 3.12 on ubuntu-latest.
# - Robot Browser downloads Chromium on first run (~2–3 min). Cache pip if runs are slow.
# - If Robot fails with missing OS libraries, uncomment the Playwright deps step below.
# - Replace karinehei in README badge after pushing to GitHub.

name: QA Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: qa-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-tests:
    name: Lint · Build · API · Robot UI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Newman/Robot need a Node server with API routes — not static GitHub Pages export.
    # Override repository variables so `next build` never uses output: "export" here.
    env:
      GITHUB_PAGES: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Node.js: install, lint, typecheck, build ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      # Use `npm run build` — NOT `build:pages` (static export removes /api/contact).
      - name: Production build
        run: npm run build

      # --- Python: Robot Framework + Browser library ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Robot Framework dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/robot/requirements.txt
          rfbrowser init

      # Uncomment if Robot fails with "Host system is missing dependencies" on Ubuntu:
      # - name: Install Playwright OS dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libdrm2 \
      #       libxkbcommon0 libasound2t64 libxcomposite1 libxdamage1 libxfixes3

      # Server + tests must run in ONE step — background processes are killed when a step ends.
      - name: Run API and UI tests
        run: |
          npm run start > /tmp/app-server.log 2>&1 &
          npx --yes wait-on http-get://127.0.0.1:3000 --timeout 120000
          echo "Verifying POST /api/contact is available..."
          api_status=$(curl -s -o /tmp/api-preflight.json -w "%{http_code}" -X POST http://127.0.0.1:3000/api/contact \
            -H "Content-Type: application/json" \
            -d '{"name":"CI","email":"ci@example.com","message":"API readiness check message."}')
          if [ "$api_status" != "200" ]; then
            echo "Contact API preflight failed (HTTP ${api_status}). Response:"
            cat /tmp/api-preflight.json || true
            echo "Server log:"
            cat /tmp/app-server.log || true
            exit 1
          fi
          npx --yes newman run tests/postman/contact-api.postman_collection.json \
            --env-var "baseUrl=http://127.0.0.1:3000"
          mkdir -p tests/robot/results
          robot \
            --variable BASE_URL:http://127.0.0.1:3000 \
            --variable HEADLESS:True \
            --outputdir tests/robot/results \
            tests/robot

      - name: Upload Robot Framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports-${{ github.run_number }}
          path: |
            tests/robot/results/output.xml
            tests/robot/results/log.html
            tests/robot/results/report.html
          retention-days: 14
          if-no-files-found: warn

      # Optional: upload Newman HTML report if you add --reporters cli,htmlextra later
      # - name: Upload API test reports
      #   if: failure()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: newman-reports
      #     path: newman/
