# Deploy static portfolio to GitHub Pages (Next.js static export).
#
# Prerequisites (one-time, in the repository on GitHub):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Live URL (project site):
#   https://<your-username>.github.io/<repository-name>/
#
# REQUIRED — if deploy fails with 404 "Failed to create deployment":
#   1. Open https://github.com/<owner>/<repo>/settings/pages
#   2. Build and deployment → Source: GitHub Actions  (NOT "Deploy from a branch")
#   3. Save, then re-run this workflow
#
# Note: API routes (POST /api/contact) are excluded from the static build.
# Live contact form uses Web3Forms — set secret WEB3FORMS_ACCESS_KEY.
# Newman/Robot API tests still run in qa-tests.yml against a Node server.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build static export for GitHub Pages
        run: npm run build:pages
        env:
          GITHUB_PAGES_REPO: ${{ github.event.repository.name }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}

      - name: Verify static export (not README/Jekyll)
        run: |
          test -f out/.nojekyll || echo > out/.nojekyll
          REPO="${{ github.event.repository.name }}"
          if [ -f "out/${REPO}/index.html" ]; then
            INDEX="out/${REPO}/index.html"
          elif [ -f "out/index.html" ]; then
            INDEX="out/index.html"
          else
            echo "::error::No index.html found in out/ or out/${REPO}/"
            find out -maxdepth 3 -type f | head -30
            exit 1
          fi
          if ! grep -q 'data-testid="hero-title"' "$INDEX"; then
            echo "::error::Built index.html is not the Next.js portfolio (expected hero section)."
            head -20 "$INDEX"
            exit 1
          fi
          echo "Static export OK: $INDEX"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
