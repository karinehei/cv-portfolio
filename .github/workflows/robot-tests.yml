# Robot Framework UI smoke tests — manual only.
#
# ubuntu-latest + cached Chromium (no Docker container — avoids exit code 16).
# First run downloads Chromium once (~5 min); later runs reuse cache (~2 min setup).
#
# Run: Actions → Robot UI Tests → Run workflow

name: Robot UI Tests

on:
  workflow_dispatch:

concurrency:
  group: robot-tests
  cancel-in-progress: false

jobs:
  robot-ui:
    name: Robot UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAGES: ""
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
      UV_SYSTEM_PYTHON: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tests/robot/requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/robot/requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Setup Robot Browser
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ${{ steps.playwright-cache.outputs.cache-hit == 'true' && '1' || '' }}
        run: bash scripts/ci-setup-rfbrowser.sh

      - name: Run Robot Framework UI tests
        run: |
          npm run start > /tmp/app-server.log 2>&1 &
          npx --yes wait-on http-get://127.0.0.1:3000 --timeout 120000
          mkdir -p tests/robot/results
          robot \
            --variable BASE_URL:http://127.0.0.1:3000 \
            --variable HEADLESS:True \
            --outputdir tests/robot/results \
            tests/robot

      - name: Upload Robot Framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports-${{ github.run_number }}
          path: |
            tests/robot/results/output.xml
            tests/robot/results/log.html
            tests/robot/results/report.html
          retention-days: 14
          if-no-files-found: warn
