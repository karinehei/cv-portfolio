# Robot Framework UI smoke tests — manual only.
#
# Uses the official Playwright Docker image (Chromium pre-installed).
# Avoids the 165 MB download and silent post-download extraction on GitHub runners.
#
# Run: Actions → Robot UI Tests → Run workflow

name: Robot UI Tests

on:
  workflow_dispatch:

concurrency:
  group: robot-tests
  cancel-in-progress: false

jobs:
  robot-ui:
    name: Robot UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.49.1-noble
    env:
      GITHUB_PAGES: ""
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      UV_SYSTEM_PYTHON: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: tests/robot/requirements.txt

      - name: Install Robot Framework dependencies
        run: |
          uv pip install --system -r tests/robot/requirements.txt
          echo "Setting up rfbrowser (Chromium already in Playwright container)..."
          rfbrowser init chromium
          echo "rfbrowser init complete."

      - name: Run Robot Framework UI tests
        run: |
          npm run start > /tmp/app-server.log 2>&1 &
          npx --yes wait-on http-get://127.0.0.1:3000 --timeout 120000
          mkdir -p tests/robot/results
          robot \
            --variable BASE_URL:http://127.0.0.1:3000 \
            --variable HEADLESS:True \
            --outputdir tests/robot/results \
            tests/robot

      - name: Upload Robot Framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-reports-${{ github.run_number }}
          path: |
            tests/robot/results/output.xml
            tests/robot/results/log.html
            tests/robot/results/report.html
          retention-days: 14
          if-no-files-found: warn
